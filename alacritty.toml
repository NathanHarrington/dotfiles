[font]
# Close to VS Code
#normal = { family = "DejaVu Sans Mono", style = "Regular" }
#bold = { family = "DejaVu Sans Mono", style = "Bold" }
#italic = { family = "DejaVu Sans Mono", style = "Italic" }
#bold_italic = { family = "DejaVu Sans Mono", style = "Bold Italic" }
#size = 14.0

# Looks a little too squished for plain text
normal = { family = "IBM Plex Mono", style = "Regular" }
bold = { family = "IBM Plex Mono", style = "Bold" }
italic = { family = "IBM Plex Mono", style = "Italic" }
bold_italic = { family = "IBM Plex Mono", style = "Bold Italic" }
size = 14.0

[window]
padding = { x = 3, y = 0 }

[colors.primary]
foreground = "#00ff00"
background = "#000000"
  
[colors.cursor]
text = "#000000"
cursor = "#00ff00"

[colors.selection]
text = "#000000"
background = "#00ff00"

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500
